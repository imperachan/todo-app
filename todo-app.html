<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Todo · 春乃</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="待辦事項">
<meta name="theme-color" content="#ede8e1">
<link rel="apple-touch-icon" href="todo-icon.png">
<link rel="icon" href="todo-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #ede8e1;
  --surface:     #f5f1ec;
  --card:        #faf7f4;
  --ink:         #3d3730;
  --ink-soft:    #6b6158;
  --muted:       #a09488;
  --border:      #ddd6cc;
  --border-soft: #e8e2da;
  --sage:        #8a9e8c;
  --rose:        #c4968a;
  --slate:       #8a96a8;
  --urgent-c:    #b87070;
  --urgent-bg:   #f5eeee;
  --week-c:      #9a8c5a;
  --week-bg:     #f5f2e8;
  --later-c:     #8a96a8;
  --later-bg:    #eef0f5;
  --radius: 6px;
  --shadow: 0 2px 12px rgba(61,55,48,0.07);
}

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--ink);
  overscroll-behavior: none;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 32px 16px 100px;
}

.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
.title { font-size: 20px; font-weight: 500; letter-spacing: 0.02em; }
.subtitle { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.14em; margin-top: 3px; }
.stats { text-align: right; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); line-height: 1.8; }

.progress-wrap { margin-bottom: 22px; }
.progress-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-bottom: 5px; }
.progress-fill { height: 100%; background: var(--sage); transition: width 0.45s cubic-bezier(.4,0,.2,1); }
.progress-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }

.add-form {
  background: var(--card);
  border: 1px solid var(--border-soft);
  padding: 14px;
  margin-bottom: 14px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row:last-child { margin-bottom: 0; }

input[type="text"], input[type="date"], select, textarea {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.15s;
}
input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus { border-color: var(--sage); }
input[type="text"].task-input { flex: 1; }
input[type="date"] { font-family: 'DM Mono', monospace; font-size: 11px; width: 140px; }
select { font-size: 11px; }
textarea { width: 100%; font-size: 13px; resize: none; line-height: 1.6; display: none; }
textarea.show { display: block; }

.btn {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px; padding: 8px 14px;
  border: none; border-radius: 4px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-primary { background: var(--ink); color: #faf7f4; }
.btn-primary:hover { background: var(--ink-soft); }
.btn-secondary { background: var(--border); color: var(--ink); }
.btn-secondary:hover { background: #cfc8be; }
.btn-paste {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
  font-size: 11px; font-family: 'DM Mono', monospace;
  padding: 6px 10px; width: 100%; text-align: left;
  letter-spacing: 0.05em; border-radius: 4px;
}
.btn-paste:hover { background: var(--surface); color: var(--ink); }

.paste-panel {
  background: var(--card); border: 1px solid var(--border-soft);
  border-radius: var(--radius); padding: 14px;
  margin-bottom: 14px; display: none; box-shadow: var(--shadow);
}
.paste-panel.show { display: block; }
.paste-hint { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
.paste-actions { display: flex; gap: 8px; margin-top: 10px; }

.filters { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
.filter-btn {
  font-family: 'DM Mono', monospace; font-size: 10px;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.15s;
}
.filter-btn.active { background: var(--ink); color: var(--card); border-color: var(--ink); }

.section { margin-bottom: 20px; }
.section-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--muted); padding: 0 0 8px;
  display: flex; align-items: center; gap: 6px;
}
.section-dot { width: 5px; height: 5px; border-radius: 50%; }
.dot-urgent { background: var(--urgent-c); }
.dot-week   { background: var(--week-c); }
.dot-later  { background: var(--later-c); }
.dot-none   { background: var(--muted); }

.task-list { display: flex; flex-direction: column; gap: 5px; }

.task-item {
  background: var(--card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  display: flex; align-items: flex-start;
  gap: 10px; padding: 12px 14px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  animation: slideIn 0.2s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.task-item:active { transform: scale(0.99); background: var(--surface); }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.task-item.done { opacity: 0.42; }
.task-item.done .task-title { text-decoration: line-through; color: var(--muted); }
.task-item.overdue  { border-left: 2px solid var(--urgent-c); }
.task-item.due-soon { border-left: 2px solid var(--week-c); }

.checkbox-wrap { padding-top: 1px; flex-shrink: 0; }
.checkbox {
  width: 17px; height: 17px;
  border: 1.5px solid var(--border); border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-size: 10px; color: transparent; flex-shrink: 0;
}
.task-item.done .checkbox { background: var(--sage); border-color: var(--sage); color: white; }

.task-body { flex: 1; min-width: 0; }

.task-title {
  font-size: 13px; font-weight: 400; line-height: 1.6; word-break: break-word;
}
.task-title strong { font-weight: 500; }
.task-title em { font-style: italic; color: var(--ink-soft); }
.task-title code {
  font-family: 'DM Mono', monospace; font-size: 11px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 1px 5px; border-radius: 3px; color: var(--rose);
}
.task-title del { text-decoration: line-through; color: var(--muted); }

.task-note {
  font-size: 11px; color: var(--muted);
  margin-top: 6px; line-height: 1.65; word-break: break-word;
}
.task-note p { margin: 2px 0; }
.task-note strong { font-weight: 500; color: var(--ink-soft); }
.task-note em { font-style: italic; }
.task-note code {
  font-family: 'DM Mono', monospace; font-size: 10px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 1px 4px; border-radius: 2px; color: var(--rose);
}
.task-note h1,.task-note h2,.task-note h3 { font-size: 12px; font-weight: 500; color: var(--ink); margin: 5px 0 2px; }
.task-note ul,.task-note ol { padding-left: 14px; margin: 2px 0; }
.task-note li { margin: 2px 0; }
.task-note blockquote { border-left: 2px solid var(--border); padding-left: 8px; color: var(--muted); margin: 3px 0; }
.task-note hr { border: none; border-top: 1px solid var(--border); margin: 5px 0; }

.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.tag { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 7px; border-radius: 10px; letter-spacing: 0.06em; }
.tag-urgent { background: var(--urgent-bg); color: var(--urgent-c); }
.tag-week   { background: var(--week-bg);   color: var(--week-c); }
.tag-later  { background: var(--later-bg);  color: var(--later-c); }
.deadline-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.deadline-text.overdue  { color: var(--urgent-c); }
.deadline-text.due-soon { color: var(--week-c); }
.note-indicator { font-size: 11px; color: var(--muted); opacity: 0.6; }

.empty { text-align: center; padding: 48px 0; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; }

/* Notification */
.notif {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--ink); color: var(--card);
  font-size: 12px; padding: 9px 18px; border-radius: 20px;
  opacity: 0; transition: all 0.25s; pointer-events: none;
  white-space: nowrap; z-index: 999;
}
.notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Bottom Sheet */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(61,55,48,0.35);
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.sheet-overlay.show { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-radius: 16px 16px 0 0;
  padding: 0 0 env(safe-area-inset-bottom, 20px);
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  max-width: 480px; margin: 0 auto;
}
.sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 8px; }
.sheet-title-area { padding: 4px 20px 14px; border-bottom: 1px solid var(--border-soft); }
.sheet-task-title { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.5; word-break: break-word; }
.sheet-task-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 4px; }
.sheet-actions { padding: 8px 0 4px; }
.sheet-action {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px; font-size: 14px; color: var(--ink);
  cursor: pointer; transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.sheet-action:hover { background: var(--surface); }
.sheet-action:active { background: var(--border-soft); }
.sheet-action .icon {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.icon-note   { background: #edf2ee; }
.icon-copy   { background: #eef0f5; }
.icon-delete { background: #f5eeee; }
.sheet-action.delete { color: var(--urgent-c); }

/* Note modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(61,55,48,0.4);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  display: flex; align-items: flex-end; justify-content: center;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--card);
  border-radius: 16px 16px 0 0;
  padding: 20px 20px calc(env(safe-area-inset-bottom, 16px) + 16px);
  width: 100%; max-width: 480px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.modal textarea { width: 100%; height: 160px; font-size: 13px; line-height: 1.7; resize: none; border-radius: 6px; display: block; margin-bottom: 10px; }
.modal-hint { font-size: 11px; color: var(--muted); margin-bottom: 12px; line-height: 1.55; }
.modal-actions { display: flex; gap: 8px; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div>
      <div class="title">待辦清單</div>
      <div class="subtitle" id="today-date"></div>
    </div>
    <div class="stats" id="stats-text"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label">
      <span id="progress-label">0 / 0 完成</span>
      <span id="progress-pct">0%</span>
    </div>
  </div>

  <div class="add-form">
    <div class="form-row">
      <input type="text" class="task-input" id="task-input" placeholder="新增任務… 支援 **粗體** _斜體_ `code`" />
      <button class="btn btn-primary" onclick="addTask()">新增</button>
    </div>
    <div class="form-row">
      <input type="date" id="deadline-input" />
      <select id="priority-input">
        <option value="none">無分類</option>
        <option value="urgent">🔴 緊急</option>
        <option value="week">🟡 本週</option>
        <option value="later">🔵 之後</option>
      </select>
    </div>
    <div class="form-row">
      <button class="btn btn-paste" onclick="togglePaste()">📋 貼上清單，自動解析匯入</button>
    </div>
  </div>

  <div class="paste-panel" id="paste-panel">
    <div class="paste-hint">將待辦清單文字貼入，自動辨識任務、截止日期與優先級。支援 Markdown 格式。</div>
    <textarea id="paste-input" placeholder="貼上文字…" class="show" style="height:80px"></textarea>
    <div class="paste-actions">
      <button class="btn btn-primary" onclick="parsePaste()">解析並匯入</button>
      <button class="btn btn-secondary" onclick="togglePaste()">取消</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
    <button class="filter-btn" onclick="setFilter('active', this)">未完成</button>
    <button class="filter-btn" onclick="setFilter('done', this)">已完成</button>
    <button class="filter-btn" onclick="setFilter('urgent', this)">緊急</button>
  </div>

  <div id="task-container"></div>
</div>

<div class="notif" id="notif"></div>

<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title-area">
    <div class="sheet-task-title" id="sheet-title"></div>
    <div class="sheet-task-meta" id="sheet-meta"></div>
  </div>
  <div class="sheet-actions">
    <div class="sheet-action" onclick="openNoteModal()">
      <div class="icon icon-note">📝</div>
      <span id="sheet-note-label">新增備註</span>
    </div>
    <div class="sheet-action" onclick="copyTask()">
      <div class="icon icon-copy">📋</div>
      <span>複製任務文字</span>
    </div>
    <div class="sheet-action delete" onclick="confirmDelete()">
      <div class="icon icon-delete">🗑️</div>
      <span>刪除任務</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-label">備註</div>
    <div class="modal-hint">支援 Markdown：**粗體** _斜體_ `code` ## 標題 - 清單</div>
    <textarea id="note-input" placeholder="在這裡寫下備註…"></textarea>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveNote()">儲存</button>
      <button class="btn btn-secondary" onclick="closeModalDirect()">取消</button>
    </div>
  </div>
</div>

<script>
let tasks = [];
let currentFilter = 'all';
let activeTaskId = null;

function loadTasks() {
  try {
    const r = localStorage.getItem('haruno-todos');
    if (r) tasks = JSON.parse(r);
  } catch(e) { tasks = []; }
  render();
}
function saveTasks() {
  try { localStorage.setItem('haruno-todos', JSON.stringify(tasks)); } catch(e) {}
}

// Inline markdown (for task titles)
function parseInline(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/__(.+?)__/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>');
}

// Block markdown (for notes)
function parseMarkdown(text) {
  if (!text) return '';
  let s = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/__(.+?)__/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^[\-\*] (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  s = s.replace(/(<li>[\s\S]+?<\/li>)/g, m => `<ul>${m}</ul>`);
  s = s.split('\n').map(line => {
    if (!line.trim()) return '';
    if (/^<(h[123]|ul|hr|blockquote)/.test(line)) return line;
    return `<p>${line}</p>`;
  }).join('');
  return s;
}

function today() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) {
  if (!d) return '';
  const [,m,day] = d.split('-');
  return `${+m}月${+day}日`;
}
function deadlineStatus(d) {
  if (!d) return 'none';
  const diff = (new Date(d) - new Date(today())) / 86400000;
  if (diff < 0) return 'overdue';
  if (diff <= 2) return 'due-soon';
  return 'ok';
}

function addTask() {
  const title = document.getElementById('task-input').value.trim();
  if (!title) return;
  const deadline = document.getElementById('deadline-input').value;
  const priority = document.getElementById('priority-input').value;
  tasks.push({ id: Date.now(), title, deadline, priority, done: false, note: '' });
  document.getElementById('task-input').value = '';
  document.getElementById('deadline-input').value = '';
  document.getElementById('priority-input').value = 'none';
  saveTasks(); render(); notify('已新增任務');
}
document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

function toggleDone(id, e) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  saveTasks(); render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(); render(); notify('已刪除');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function togglePaste() {
  document.getElementById('paste-panel').classList.toggle('show');
}

function parsePaste() {
  const text = document.getElementById('paste-input').value;
  if (!text.trim()) return;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  let added = 0;
  const urgentKw = ['緊急','最緊急','明日','明天','today','urgent','🔴'];
  const weekKw   = ['本週','週內','week','🟡'];
  const laterKw  = ['之後','下週','later','🔵'];
  const dateRe   = /(\d{1,2})月(\d{1,2})日|(\d{1,2})\/(\d{1,2})/;

  lines.forEach(line => {
    if (/^#+/.test(line) || line.length < 2) return;
    let title = line.replace(/^[-*•✅☑️⬜□▢✦✧▸►✓✔︎\[\]xX\d\. ]+/, '').trim();
    title = title.replace(/^(🔴|🟡|🔵|⭕|⚠️|🔔)\s*/, '').trim();
    if (!title || title.length < 2) return;
    let deadline = '';
    const dm = line.match(dateRe);
    if (dm) {
      const mo = (dm[1]||dm[3]).padStart(2,'0');
      const dy = (dm[2]||dm[4]).padStart(2,'0');
      deadline = `${new Date().getFullYear()}-${mo}-${dy}`;
      title = title.replace(dateRe,'').replace(/截止[:：]?/,'').replace(/⏰\s*/,'').trim();
    }
    let priority = 'none';
    if (urgentKw.some(k=>line.includes(k))) priority = 'urgent';
    else if (weekKw.some(k=>line.includes(k))) priority = 'week';
    else if (laterKw.some(k=>line.includes(k))) priority = 'later';
    if (title.length >= 2) {
      tasks.push({ id: Date.now()+Math.random(), title, deadline, priority, done: false, note: '' });
      added++;
    }
  });

  if (added > 0) {
    saveTasks(); render();
    document.getElementById('paste-input').value = '';
    togglePaste();
    notify(`已匯入 ${added} 筆任務`);
  } else {
    notify('未能識別任何任務');
  }
}

// Bottom sheet
function openSheet(id) {
  activeTaskId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('sheet-title').innerHTML = parseInline(t.title);
  const meta = [];
  if (t.deadline) meta.push(formatDate(t.deadline));
  if (t.priority !== 'none') meta.push({urgent:'緊急',week:'本週',later:'之後'}[t.priority]);
  document.getElementById('sheet-meta').textContent = meta.join(' · ');
  document.getElementById('sheet-note-label').textContent = t.note ? '編輯備註' : '新增備註';
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

function copyTask() {
  const t = tasks.find(t => t.id === activeTaskId);
  if (!t) return;
  const text = t.note ? `${t.title}\n\n${t.note}` : t.title;
  navigator.clipboard.writeText(text).then(() => {
    closeSheet(); notify('已複製');
  }).catch(() => {
    closeSheet(); notify('複製失敗，請手動複製');
  });
}

function confirmDelete() {
  closeSheet();
  setTimeout(() => deleteTask(activeTaskId), 250);
}

function openNoteModal() {
  const t = tasks.find(t => t.id === activeTaskId);
  if (!t) return;
  closeSheet();
  setTimeout(() => {
    document.getElementById('note-input').value = t.note || '';
    document.getElementById('modal-overlay').classList.add('show');
  }, 300);
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function saveNote() {
  const t = tasks.find(t => t.id === activeTaskId);
  if (t) {
    t.note = document.getElementById('note-input').value.trim();
    saveTasks(); render(); notify('備註已儲存');
  }
  document.getElementById('modal-overlay').classList.remove('show');
}

function render() {
  const container = document.getElementById('task-container');
  let filtered = [...tasks];
  if (currentFilter === 'active')  filtered = filtered.filter(t => !t.done);
  else if (currentFilter === 'done')   filtered = filtered.filter(t => t.done);
  else if (currentFilter === 'urgent') filtered = filtered.filter(t => t.priority === 'urgent');

  filtered.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.deadline && b.deadline) return a.deadline.localeCompare(b.deadline);
    if (a.deadline) return -1;
    if (b.deadline) return 1;
    return 0;
  });

  const groups = [
    { key: 'urgent', label: '緊急', dotClass: 'dot-urgent' },
    { key: 'week',   label: '本週', dotClass: 'dot-week'   },
    { key: 'later',  label: '之後', dotClass: 'dot-later'  },
    { key: 'none',   label: '其他', dotClass: 'dot-none'   },
  ];
  const tagMap = { urgent:'tag-urgent', week:'tag-week', later:'tag-later' };
  const tagLabel = { urgent:'緊急', week:'本週', later:'之後' };

  let html = '';
  if (filtered.length === 0) {
    html = `<div class="empty">暫無任務 ✦</div>`;
  } else {
    groups.forEach(g => {
      const items = filtered.filter(t => t.priority === g.key);
      if (!items.length) return;
      html += `<div class="section">`;
      html += `<div class="section-label"><span class="section-dot ${g.dotClass}"></span>${g.label}</div>`;
      html += `<div class="task-list">`;
      items.forEach(t => {
        const ds = deadlineStatus(t.deadline);
        const oClass = ds === 'overdue' ? 'overdue' : ds === 'due-soon' ? 'due-soon' : '';
        const dClass = t.done ? 'done' : '';
        const dlLabel = t.deadline
          ? `<span class="deadline-text ${oClass}">${ds==='overdue'?'已逾期 · ':ds==='due-soon'?'即將到期 · ':''}${formatDate(t.deadline)}</span>`
          : '';
        const tg = t.priority !== 'none' ? `<span class="tag ${tagMap[t.priority]}">${tagLabel[t.priority]}</span>` : '';
        const noteHtml = t.note ? `<div class="task-note">${parseMarkdown(t.note)}</div>` : '';
        const noteIcon = t.note ? `<span class="note-indicator">💬</span>` : '';
        const hasMeta = dlLabel || tg || t.note;

        html += `
          <div class="task-item ${dClass} ${oClass}" onclick="openSheet(${t.id})">
            <div class="checkbox-wrap">
              <div class="checkbox" onclick="toggleDone(${t.id},event)">✓</div>
            </div>
            <div class="task-body">
              <div class="task-title">${parseInline(t.title)}</div>
              ${noteHtml}
              ${hasMeta ? `<div class="task-meta">${tg}${dlLabel}${noteIcon}</div>` : ''}
            </div>
          </div>`;
      });
      html += `</div></div>`;
    });
  }

  container.innerHTML = html;

  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total} 完成`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('stats-text').textContent = `${tasks.filter(t=>!t.done).length} 未完成`;

  const now = new Date();
  document.getElementById('today-date').textContent =
    `${now.getFullYear()} · ${String(now.getMonth()+1).padStart(2,'0')} · ${String(now.getDate()).padStart(2,'0')}`;
}

function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

loadTasks();
</script>
</body>
</html>
